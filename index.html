<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Simulasi Hukum Peluruhan Radioaktif - Perfect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #e0e0ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { 
            font-size: 2.5em; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .control {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }
        .control span { font-weight: 600; color: #4ecdc4; }
        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }
        .start { background: linear-gradient(45deg, #4ecdc4, #44a08d); color: white; }
        .pause { background: linear-gradient(45deg, #f39c12, #e67e22); color: white; }
        .reset { background: linear-gradient(45deg, #ff6b6b, #ee5a52); color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            align-items: start;
        }
        .canvas-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        canvas {
            display: block;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: #000;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(76, 205, 196, 0.3);
        }
        .stat-value { 
            font-size: 2em; 
            font-weight: 800; 
            background: linear-gradient(45deg, #4ecdc4, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .graph-panel {
            height: 500px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .graph-title {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #4ecdc4;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Hukum Peluruhan Radioaktif</h1>
            <p style="opacity: 0.8;">N(t) = N₀ • e<sup>-λt</sup></p>
        </div>

        <div class="controls">
            <div class="control">
                <span>λ = <span id="lambdaDisp">0.01</span> s<sup>-1</sup></span>
                <input type="range" id="lambdaSlider" min="0.001" max="0.2" step="0.001" value="0.01">
            </div>
            <button class="start" id="startBtn">▶️ START</button>
            <button class="pause" id="pauseBtn">⏸️ PAUSE</button>
            <button class="reset" id="resetBtn">🔄 RESET</button>
        </div>

        <div class="main-grid">
            <div class="canvas-panel">
                <canvas id="simCanvas" width="800" height="500"></canvas>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="timeVal">0.0</div>
                        <div>Waktu (s)</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="nVal">1000</div>
                        <div>N Aktif</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="halfVal">69.3</div>
                        <div>T<sub>1/2</sub> (s)</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="rateVal">1.0%</div>
                        <div>Rate Peluruhan</div>
                    </div>
                </div>
            </div>
            <div class="graph-panel">
                <div class="graph-title">📈 Kurva Peluruhan Real-time (N vs t)</div>
                <canvas id="graphCanvas" width="350" height="450"></canvas>
            </div>
        </div>
    </div>

    <script>
class PerfectDecaySim {
    constructor() {
        this.simCanvas = document.getElementById('simCanvas');
        this.simCtx = this.simCanvas.getContext('2d');
        this.graphCanvas = document.getElementById('graphCanvas');
        this.graphCtx = this.graphCanvas.getContext('2d');
        
        // State
        this.N0 = 1000;
        this.N = 1000;
        this.t = 0;
        this.lambda = 0.01;
        this.running = false;
        this.animationId = null;
        this.atoms = [];
        this.history = [];
        this.dt = 1/60; // 60 FPS
        
        this.init();
        this.bindEvents();
        this.render();
    }
    
    init() {
        this.N = this.N0;
        this.t = 0;
        this.history = [{t: 0, N: this.N0}];
        this.generateAtoms();
        this.updateDisplay();
    }
    
    generateAtoms() {
        this.atoms = [];
        const cols = 35, rows = 25;
        const spacing = 22;
        for (let i = 0; i < this.N0; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            this.atoms.push({
                x: 30 + col * spacing,
                y: 30 + row * spacing,
                alive: true
            });
        }
    }
    
    bindEvents() {
        document.getElementById('lambdaSlider').oninput = (e) => {
            this.lambda = parseFloat(e.target.value);
            document.getElementById('lambdaDisp').textContent = this.lambda.toFixed(3);
            document.getElementById('halfVal').textContent = (Math.LN2 / this.lambda).toFixed(1);
        };
        
        document.getElementById('startBtn').onclick = () => this.start();
        document.getElementById('pauseBtn').onclick = () => this.pause();
        document.getElementById('resetBtn').onclick = () => this.reset();
    }
    
    start() {
        if (!this.running) {
            this.running = true;
            this.animate();
        }
    }
    
    pause() {
        this.running = false;
        if (this.animationId) cancelAnimationFrame(this.animationId);
    }
    
    reset() {
        this.pause();
        this.init();
        this.render();
    }
    
    animate() {
        if (!this.running) return;
        
        this.updatePhysics();
        this.updateDisplay();
        this.render();
        this.animationId = requestAnimationFrame(() => this.animate());
    }
    
    updatePhysics() {
        // Hukum Peluruhan Eksak: Monte Carlo Method
        const pDecay = this.lambda * this.dt;
        let decayed = 0;
        
        this.atoms.forEach(atom => {
if (atom.alive && Math.random() < pDecay) {
                atom.alive = false;
                decayed++;
                this.N--;
            }
        });
        
        this.t += this.dt;
        this.history.push({t: this.t, N: this.N});
        
        // Limit history
        if (this.history.length > 2000) this.history.shift();
        
        // Rate = decayed atoms / active atoms * 100
        const rate = (decayed / Math.max(1, this.N + decayed)) * 100;
        document.getElementById('rateVal').textContent = rate.toFixed(1) + '%';
    }
    
    updateDisplay() {
        document.getElementById('timeVal').textContent = this.t.toFixed(1);
        document.getElementById('nVal').textContent = this.N.toLocaleString();
        document.getElementById('halfVal').textContent = (Math.LN2 / this.lambda).toFixed(1);
    }
    
    render() {
        // Simulation Canvas
        this.simCtx.fillStyle = '#000';
        this.simCtx.fillRect(0, 0, this.simCanvas.width, this.simCanvas.height);
        
        // Draw border
        this.simCtx.strokeStyle = '#4ecdc4';
        this.simCtx.lineWidth = 3;
        this.simCtx.strokeRect(1, 1, this.simCanvas.width-2, this.simCanvas.height-2);
        
        // Draw atoms ✨
        this.atoms.forEach(atom => {
            const glow = atom.alive ? 0.8 : 0.3;
            const gradient = this.simCtx.createRadialGradient(atom.x, atom.y, 0, atom.x, atom.y, 6);
            gradient.addColorStop(0, atom.alive ? '#ff6b6b' : '#555');
            gradient.addColorStop(1, 'transparent');
            
            this.simCtx.fillStyle = gradient;
            this.simCtx.beginPath();
            this.simCtx.arc(atom.x, atom.y, 5, 0, Math.PI * 2);
            this.simCtx.fill();
            
            // Pulse effect for active atoms
if (atom.alive && Math.random() < 0.1) {
                this.simCtx.fillStyle = 'rgba(255, 107, 107, 0.6)';
                this.simCtx.beginPath();
                this.simCtx.arc(atom.x, atom.y, 8, 0, Math.PI * 2);
                this.simCtx.fill();
            }
        });
        
        // Labels
        this.simCtx.fillStyle = '#ffffff';
        this.simCtx.font = 'bold 28px system-ui';
        this.simCtx.textAlign = 'center';
        this.simCtx.fillText(`N(t) = ${this.N}`, 400, 35);
        this.simCtx.font = '18px system-ui';
        this.simCtx.fillText('🔴 Aktif | ⚪ Stabil', 400, 480);
        
        // Graph Canvas
        this.renderGraph();
    }
    
    renderGraph() {
        const w = this.graphCanvas.width;
        const h = this.graphCanvas.height;
        this.graphCtx.fillStyle = '#000';
        this.graphCtx.fillRect(0, 0, w, h);
        
        // Grid
        this.graphCtx.strokeStyle = 'rgba(76, 205, 196, 0.2)';
        this.graphCtx.lineWidth = 1;
        for (let i = 0; i <= 10; i++) {
            const x = (w * i) / 10;
            this.graphCtx.beginPath();
            this.graphCtx.moveTo(x, 0);
            this.graphCtx.lineTo(x, h);
            this.graphCtx.stroke();
            
            const y = (h * i) / 10;
            this.graphCtx.beginPath();
            this.graphCtx.moveTo(0, y);
            this.graphCtx.lineTo(w, y);
            this.graphCtx.stroke();
        }
        
        // Curve N(t)
        if (this.history.length > 1) {
            this.graphCtx.strokeStyle = '#4ecdc4';
            this.graphCtx.lineWidth = 3;
            this.graphCtx.lineJoin = 'round';
            this.graphCtx.lineCap = 'round';
            this.graphCtx.shadowColor = '#4ecdc4';
            this.graphCtx.shadowBlur = 10;
            this.graphCtx.beginPath();
            
            const maxT = Math.max(...this.history.map(p => p.t));
            this.history.forEach((p, i) => {
                const x = (p.t / maxT) * (w - 40) + 20;
                const y = h - (p.N / this.N0) * (h - 40) - 20;
                if (i === 0) this.graphCtx.moveTo(x, y);
                else this.graphCtx.lineTo(x, y);
            });
            this.graphCtx.stroke();
            this.graphCtx.shadowBlur = 0;
        }
        
        // Axes labels
        this.graphCtx.fillStyle = '#aaa';
        this.graphCtx.font = '14px system-ui';
        this.graphCtx.textAlign = 'center';
        this.graphCtx.fillText('Waktu t →', w/2, h-5);
        this.graphCtx.save();
        this.graphCtx.translate(10, h/2);
        this.graphCtx.rotate(-Math.PI/2);
        this.graphCtx.fillText('← N(t)', 0, 0);
        this.graphCtx.restore();
    }
}

new PerfectDecaySim();
    </script>
</body>
</html>
